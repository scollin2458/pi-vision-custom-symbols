<div class="weather-symbol" style="width:100%; height:100%; box-sizing:border-box;">
  <div class="weather-card" style="width:100%; height:100%; box-sizing:border-box; padding:16px; border-radius:12px; background:linear-gradient(180deg, #123d6b 0%, #1d6fb8 100%); color:#ffffff; font-family:Segoe UI, Arial, sans-serif; box-shadow:0 6px 18px rgba(0,0,0,0.18); overflow:hidden;">
    <div class="weather-status" style="font-size:12px; letter-spacing:0.08em; text-transform:uppercase; opacity:0.82;">Loading weather...</div>
    <div class="weather-city" style="margin-top:8px; font-size:22px; font-weight:600; line-height:1.2;">--</div>
    <div class="weather-updated" style="margin-top:4px; font-size:12px; opacity:0.82;">--</div>

    <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-top:18px;">
      <div>
        <div class="weather-temperature" style="font-size:46px; font-weight:700; line-height:1;">--°C</div>
        <div class="weather-description" style="margin-top:8px; font-size:16px; font-weight:500;">--</div>
        <div class="weather-range" style="margin-top:6px; font-size:13px; opacity:0.9;">--</div>
      </div>
      <div class="weather-emoji" style="font-size:54px; line-height:1;">⛅</div>
    </div>

    <div style="display:grid; grid-template-columns:repeat(2, minmax(0, 1fr)); gap:10px; margin-top:18px;">
      <div style="background:rgba(255,255,255,0.12); border-radius:10px; padding:10px;">
        <div style="font-size:11px; opacity:0.82; text-transform:uppercase; letter-spacing:0.06em;">Feels like</div>
        <div class="weather-feels-like" style="margin-top:6px; font-size:18px; font-weight:600;">--</div>
      </div>
      <div style="background:rgba(255,255,255,0.12); border-radius:10px; padding:10px;">
        <div style="font-size:11px; opacity:0.82; text-transform:uppercase; letter-spacing:0.06em;">Humidity</div>
        <div class="weather-humidity" style="margin-top:6px; font-size:18px; font-weight:600;">--</div>
      </div>
      <div style="background:rgba(255,255,255,0.12); border-radius:10px; padding:10px;">
        <div style="font-size:11px; opacity:0.82; text-transform:uppercase; letter-spacing:0.06em;">Wind</div>
        <div class="weather-wind" style="margin-top:6px; font-size:18px; font-weight:600;">--</div>
      </div>
      <div style="background:rgba(255,255,255,0.12); border-radius:10px; padding:10px;">
        <div style="font-size:11px; opacity:0.82; text-transform:uppercase; letter-spacing:0.06em;">Rain chance</div>
        <div class="weather-precipitation" style="margin-top:6px; font-size:18px; font-weight:600;">--</div>
      </div>
    </div>
  </div>
</div>
